services:
  postgres:
    container_name: postgres
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: money-dev2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: RjirfLeyz
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: api
    build:
      context: ../.
      dockerfile: backend/Money.Api/Dockerfile
    ports:
      - "4080:80"
      - "4443:443"

  client:
    image: client
    build:
      context: ../.
      dockerfile: frontend/Money.Web/Dockerfile
    ports:
      - "5080:80"
      - "5443:443"

volumes:
  postgres-data:
